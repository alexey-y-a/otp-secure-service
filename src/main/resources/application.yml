spring:
  application:
    name: otp-secure-service
  datasource:
    url: jdbc:h2:mem:otpdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    ru.alexey.otpsecureservice: DEBUG